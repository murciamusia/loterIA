<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loterIA - Apuestas por Inteligencia Artificial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }
    header {
      background: rgba(0,0,0,0.7);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
    }
    .logo {
      height: 40px;
      margin-right: 1rem;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 2rem;
    }
    .cta {
      background: #00ffc8;
      color: #000;
      padding: 1rem 2rem;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .cta:hover {
      background: #00cc9e;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <header>
    <h1><img src="logo.png" class="logo" alt="Logo loterIA" />loterIA</h1>
    <nav>
      <a href="#" class="cta">Únete a la peña</a>
    </nav>
  </header>

  <main>
    <h2>Bienvenido a la peña inteligente de apuestas</h2>
    <p>
      Combinaciones basadas en análisis estadístico y generación IA. Súmate y juega con datos reales.
    </p>
    <a href="#" class="cta">Ver combinaciones</a>
  </main>

  <footer>
    <p>&copy; 2025 loterIA - Apuestas estadísticas por IA</p>
  </footer>
</body>
</html>
